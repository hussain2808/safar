<svg width="165" height="148" viewBox="0 0 165 148" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wbSky" x1="65" y1="20" x2="65" y2="138" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFF9F2"/>
      <stop offset="22%"  stop-color="#FFE8C0"/>
      <stop offset="55%"  stop-color="#FFCC78"/>
      <stop offset="100%" stop-color="#E8D4A8"/>
    </linearGradient>
    <linearGradient id="wbWater" x1="65" y1="110" x2="65" y2="138" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C2DED8"/>
      <stop offset="100%" stop-color="#9EC5BA"/>
    </linearGradient>
    <radialGradient id="wbSunGlow" cx="65" cy="58" r="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFA820" stop-opacity="0.55"/>
      <stop offset="45%"  stop-color="#FFCA40" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FFE590" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="wbClip">
      <path d="M19,138 L19,72 A46,46 0 0,1 111,72 L111,138 Z"/>
    </clipPath>
  </defs>

  <!-- Window frame (cream arch background) -->
  <path d="M12,140 L12,72 A53,53 0 0,1 118,72 L118,140 Z" fill="#EDE0CC"/>

  <!-- Window interior (clipped) -->
  <g clip-path="url(#wbClip)">
    <!-- Sky gradient -->
    <rect x="19" y="20" width="92" height="118" fill="url(#wbSky)"/>

    <!-- Sun glow -->
    <circle cx="65" cy="58" r="28" fill="url(#wbSunGlow)"/>
    <circle cx="65" cy="58" r="8"  fill="#FFA820" opacity="0.55"/>

    <!-- Back mountains (light sage) -->
    <path d="M19,106 L36,83 L50,97 L65,77 L80,92 L96,79 L111,87 L111,106 Z"
          fill="#A8C4A0" opacity="0.65"/>

    <!-- Front mountains (richer sage) -->
    <path d="M19,116 L40,97 L55,110 L71,91 L87,104 L106,93 L111,96 L111,116 Z"
          fill="#88AE86" opacity="0.92"/>

    <!-- Water -->
    <rect x="19" y="116" width="92" height="22" fill="url(#wbWater)"/>
    <line x1="26" y1="121" x2="46" y2="121" stroke="#A4C8C0" stroke-width="1"   opacity="0.65" stroke-linecap="round"/>
    <line x1="54" y1="125" x2="78" y2="125" stroke="#A4C8C0" stroke-width="1"   opacity="0.65" stroke-linecap="round"/>
    <line x1="32" y1="129" x2="57" y2="129" stroke="#A4C8C0" stroke-width="0.8" opacity="0.50" stroke-linecap="round"/>

    <!-- Birds (small V arcs) -->
    <path d="M34,42 Q37,38.5 40,42" stroke="#C09070" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <path d="M46,35 Q49,31.5 52,35" stroke="#C09070" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <path d="M56,45 Q58,43   60,45" stroke="#C09070" stroke-width="1.1" fill="none" stroke-linecap="round"/>
    <path d="M76,39 Q78,37   80,39" stroke="#C09070" stroke-width="1.1" fill="none" stroke-linecap="round"/>

    <!-- Window pane dividers (inside clip so they're masked by arch) -->
    <line x1="65" y1="20"  x2="65"  y2="138" stroke="#C8A878" stroke-width="2.2" opacity="0.50"/>
    <line x1="19" y1="90"  x2="111" y2="90"  stroke="#C8A878" stroke-width="2.2" opacity="0.50"/>
  </g>

  <!-- Window frame border on top -->
  <path d="M12,140 L12,72 A53,53 0 0,1 118,72 L118,140"
        fill="none" stroke="#C8A878" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- PLANT -->
  <!-- Stem + branches -->
  <path d="M136,122 L136,96 Q136,86 130,83"
        stroke="#6B9E70" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M136,108 Q128,102 124,95"
        stroke="#6B9E70" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M136,100 Q144,95 148,88"
        stroke="#6B9E70" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- Leaves -->
  <ellipse cx="127" cy="82" rx="10" ry="5"   fill="#7BAF80" opacity="0.90" transform="rotate(-35 127 82)"/>
  <ellipse cx="149" cy="86" rx="9"  ry="4.5" fill="#6B9E70" opacity="0.90" transform="rotate(28 149 86)"/>
  <ellipse cx="122" cy="95" rx="8"  ry="4"   fill="#8BBF8A" opacity="0.85" transform="rotate(-45 122 95)"/>
  <ellipse cx="149" cy="93" rx="8"  ry="4"   fill="#7BAF80" opacity="0.85" transform="rotate(38 149 93)"/>
  <ellipse cx="124" cy="104" rx="7" ry="3.5" fill="#6B9E70" opacity="0.80" transform="rotate(-30 124 104)"/>
  <!-- Pot -->
  <rect x="127" y="120" width="18" height="5" rx="2.5" fill="#C4A882"/>
  <path d="M129,125 L127,135 L145,135 L143,125 Z" fill="#C4A882"/>
  <line x1="128" y1="129" x2="144" y2="129" stroke="#B09068" stroke-width="1" opacity="0.45"/>

  <!-- BOOK -->
  <rect x="92" y="123" width="45" height="14" rx="3"   fill="#9B7A50"/>
  <rect x="92" y="123" width="6"  height="14" rx="2"   fill="#7A6040"/>
  <rect x="96" y="125" width="39" height="10" rx="2"   fill="#B08858" opacity="0.35"/>
  <!-- Bookmark -->
  <rect x="122" y="112" width="5"  height="22" rx="1.5" fill="#C89870"/>
  <path d="M122,134 L124.5,130 L127,134" fill="#C89870"/>
  <!-- Star emblem on cover -->
  <circle cx="111" cy="130" r="2.8" fill="#C89870" opacity="0.65"/>
  <circle cx="111" cy="130" r="1.3" fill="#D4AA80" opacity="0.80"/>

  <!-- Soft warm light ray from window onto scene -->
  <path d="M118,74 L152,102 L152,118 L118,96 Z" fill="#FFD080" opacity="0.06"/>
</svg>
